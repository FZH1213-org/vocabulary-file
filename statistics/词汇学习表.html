        // 生成词性（基于常见规则）
        function getPOS(word, translation) {
            const suffix = word.toLowerCase();
            const trans = translation.toLowerCase();

            // 常见后缀规则
            if (suffix.endsWith('tion') || suffix.endsWith('sion') || suffix.endsWith('ment') ||
                suffix.endsWith('ness') || suffix.endsWith('ity') || suffix.endsWith('ance') ||
                suffix.endsWith('ence') || suffix.endsWith('dom')) {
                return 'n.';
            }
            if (suffix.endsWith('ly')) {
                return 'adv.';
            }
            if (suffix.endsWith('ful') || suffix.endsWith('less') || suffix.endsWith('ous') ||
                suffix.endsWith('ive') || suffix.endsWith('able') || suffix.endsWith('ible') ||
                suffix.endsWith('al') || suffix.endsWith('ic') || suffix.endsWith('ent') ||
                suffix.endsWith('ant') || suffix.endsWith('ical')) {
                return 'adj.';
            }
            if (suffix.endsWith('ize') || suffix.endsWith('ify') || suffix.endsWith('ate') ||
                suffix.endsWith('en') || suffix.endsWith('er')) {
                return 'v.';
            }

            // 根据中文释义判断
            if (trans.includes('的')) return 'adj.';
            if (trans.includes('地')) return 'adv.';

            return 'v./n.';
        }

        // 生成简单例句
        function generateExample(word, translation) {
            const examples = [
                {en: `This is a typical example of ${word}.`, cn: `这是${word}的一个典型例子。`},
                {en: `We need to understand ${word} better.`, cn: `我们需要更好地理解${word}。`},

                {en: `Can you explain ${word}?`, cn: `你能解释一下${word}吗？`}
            ];
            return examples[Math.floor(Math.random() * examples.length)];
        }

                vocab.phonetic = getPhonetic(vocab.word);
                vocab.example = generateExample(vocab.word, vocab.translation);
            });

            filteredData = [...vocabularyData];

            // 初始化故事筛选器

                };
                clearTimeout(timeout);
                timeout = setTimeout(later, wait);
            };
        }

        // 初始化故事筛选器
        function initStoryFilter() {
            const storyFilter = document.getElementById('storyFilter');
            const stories = [...new Set(vocabularyData.map(v => v.storyName))];

            stories.forEach(story => {
                const option = document.createElement('option');
                option.value = story;
                option.textContent = story;
                storyFilter.appendChild(option);
            });

            document.getElementById('total-stories').textContent = stories.length;
        }

        // 渲染词汇列表
        function renderVocabulary() {
            const container = document.getElementById('vocabularyList');
            container.innerHTML = '';

            const start = (currentPage - 1) * itemsPerPage;
            const end = start + itemsPerPage;
            const pageData = filteredData.slice(start, end);

            if (pageData.length === 0) {
                container.innerHTML = '<div class="no-results">未找到匹配的词汇 😢</div>';
                document.getElementById('pagination').innerHTML = '';
                return;
            }

            pageData.forEach(vocab => {
                const card = document.createElement('div');
                card.className = 'vocab-card';
                card.innerHTML = `
                    <div class="vocab-header">
                        <span class="vocab-number">#${vocab.id}</span>
                    </div>
                    <div class="vocab-word">${vocab.word}</div>
                    <div class="vocab-phonetic">
                        <span class="phonetic-text">${vocab.phonetic}</span>
                        <button class="speak-btn" onclick="speakWord('${vocab.word}')">
                            🔊 朗读
                        </button>
                    </div>
                    <div class="vocab-pos">
                        <div class="pos-label">${vocab.pos}</div>
                        <div class="pos-meaning">${vocab.translation}</div>
                    </div>
                    <div class="vocab-example">
                        <div class="example-en">${vocab.example.en}</div>
                        <div class="example-cn">${vocab.example.cn}</div>
                    </div>
                    <div class="vocab-story">
                        <span class="story-name">${vocab.storyName}</span>
                        <span class="count-badge">出现 ${vocab.count} 次</span>
                    </div>
                `;
                container.appendChild(card);
            });

            renderPagination();
        }

        // 渲染分页
        function renderPagination() {
            const totalPages = Math.ceil(filteredData.length / itemsPerPage);
            const pagination = document.getElementById('pagination');

            if (totalPages <= 1) {
                pagination.innerHTML = `<span class="page-info">共 ${filteredData.length} 个词汇</span>`;
                return;
            }

            let html = `
                <button class="page-btn" onclick="changePage(1)" ${currentPage === 1 ? 'disabled' : ''}>首页</button>
                <button class="page-btn" onclick="changePage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>上一页</button>
                <span class="page-info">第 ${currentPage} / ${totalPages} 页</span>
                <button class="page-btn" onclick="changePage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>下一页</button>
                <button class="page-btn" onclick="changePage(${totalPages})" ${currentPage === totalPages ? 'disabled' : ''}>尾页</button>
                <div class="page-jump">
                    <input type="number" class="page-jump-input" id="pageJumpInput" min="1" max="${totalPages}" placeholder="${currentPage}">
                    <button class="page-btn" onclick="jumpToPage()">跳转</button>
                </div>
            `;

            pagination.innerHTML = html;
        }

        // 切换页面
        function changePage(page) {
            const totalPages = Math.ceil(filteredData.length / itemsPerPage);
            if (page < 1 || page > totalPages) return;

            currentPage = page;
            renderVocabulary();
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        // 跳转到指定页
        function jumpToPage() {
            const input = document.getElementById('pageJumpInput');
            const page = parseInt(input.value);
            if (page) {
                changePage(page);
            }
        }

        // 搜索处理
        function handleSearch(e) {
            const query = e.target.value.toLowerCase().trim();
            filterData(query, document.getElementById('storyFilter').value);
            currentPage = 1;
            renderVocabulary();
        }

        // 筛选处理
        function handleFilter(e) {
            const story = e.target.value;
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            filterData(query, story);
            currentPage = 1;
            renderVocabulary();
        }

        // 排序处理
        function handleSort(e) {
            const sortBy = e.target.value;

            filteredData.sort((a, b) => {
                switch(sortBy) {
                    case 'id':
                        return a.id - b.id;
                    case 'count':
                        return b.count - a.count;
                    case 'word':
                        return a.word.localeCompare(b.word);
                    default:
                        return 0;
                }
            });

            currentPage = 1;
            renderVocabulary();
        }

        // 过滤数据
        function filterData(query, story) {
            filteredData = vocabularyData.filter(vocab => {
                const matchQuery = query === '' ||
                    vocab.word.toLowerCase().includes(query) ||
                    vocab.translation.includes(query);
                const matchStory = story === '' || vocab.storyName === story;
                return matchQuery && matchStory;
            });

            document.getElementById('filtered-words').textContent = filteredData.length;
        }

        // 朗读单词
        function speakWord(word) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(word);
                utterance.lang = 'en-US';
                utterance.rate = 0.8;
                utterance.pitch = 1;
                window.speechSynthesis.speak(utterance);
            } else {
                alert('您的浏览器不支持语音朗读功能 😔');
            }
        }

        // 页面加载完成后初始化
        window.addEventListener('load', initApp);
    </script>
</body>
</html>
